version: 2

sources:
  - name: financial
    database: financial
    tables:
      - name: raw_prices
        columns:
          - name: ticker
            description: Stock ticker symbol
          - name: date
            description: Trading date
          - name: open
            description: Opening price
          - name: high
            description: Daily high price
          - name: low
            description: Daily low price
          - name: close
            description: Closing price
          - name: volume
            description: Trading volume

models:
  - name: stg_prices
    description: Cleaned stock price data ready for analytics
    columns:
      - name: ticker
        description: Stock ticker symbol
        tests:
          - not_null
      - name: date
        description: Trading date
        tests:
          - not_null
      - name: close
        description: Adjusted closing price
        tests:
          - not_null
    tests:
      - unique:
          column_name: "(ticker || '-' || date)"